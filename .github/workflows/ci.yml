name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: casino_transactions
          POSTGRES_USER: casino
          POSTGRES_PASSWORD: secretpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U casino -d casino_transactions"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_DSN: postgres://casino:secretpassword@localhost:5432/casino_transactions?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: gofmt -l .

      - name: Run tests
        run: go test ./...

      - name: Build project
        run: go build ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build --tag casino-transaction-module:ci .
